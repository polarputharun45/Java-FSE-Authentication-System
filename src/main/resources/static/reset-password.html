<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h2>Reset Password</h2>

        <input type="text"
               id="otp"
               placeholder="Enter OTP">

        <input type="password"
               id="newPassword"
               placeholder="Enter New Password">

        <button onclick="resetPassword()">
            Reset Password
        </button>

    </div>
</div>

<script src="js/script.js"></script>

</body>
</html>
